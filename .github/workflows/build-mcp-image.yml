name: build-mcp-image

# Builds the MCP server image and pushes it to GitHub Container Registry.
# Image: ghcr.io/<owner>/penca-ovacion-mcp  (private, built for linux/arm64 to
# match the ARM deploy host). Pulled by Dokploy via a registry credential.

on:
  push:
    branches: [main]
    paths:
      - 'packages/mcp/**'
      - 'packages/sdk/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/build-mcp-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/penca-ovacion-mcp
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
