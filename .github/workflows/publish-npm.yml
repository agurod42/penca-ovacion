name: publish-npm

# Publishes penca-ovacion-mcp to npm. Trigger by pushing a tag like `mcp-v0.1.0`,
# or run manually (workflow_dispatch). Requires repo secret NPM_TOKEN (an npm
# automation token with publish rights).

on:
  push:
    tags: ['mcp-v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Build sdk + mcp
        run: pnpm --filter penca-ovacion-sdk build && pnpm --filter "@1930dev/penca-ovacion-mcp" build

      - name: Publish to npm
        run: pnpm --filter "@1930dev/penca-ovacion-mcp" publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
